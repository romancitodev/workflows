name: Rust · Lint

on:
  workflow_call:
    inputs:
      clippy-extra-flags:
        description: "Flags adicionales para clippy"
        type: string
        required: false
        default: ""

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  lint:
    name: Fmt & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Lint with clippy
        run: cargo clippy --all-targets --all-features -- ${{ inputs['clippy-extra-flags'] }}
