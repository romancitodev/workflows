name: Rust · Release

on:
  workflow_call:
    secrets:
      GH_TOKEN:
        required: false   # si no se pasa, usa GITHUB_TOKEN automáticamente

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features
      - run: cargo build --release --all-features

  check-changes:
    name: Check API changes (lib)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Buscar tag anterior
        id: prev_tag
        run: |
          PREV=$(git tag --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' \
            | sed -n '2p')
          echo "tag=${PREV}" >> "$GITHUB_OUTPUT"

      - name: Diff de src/ vs tag anterior
        if: |
          steps.prev_tag.outputs.tag  != ''
        run: |
          echo "### Cambios en \`src/\` desde ${{ steps.prev_tag.outputs.tag }}" \
            >> "$GITHUB_STEP_SUMMARY"
          git diff "${{ steps.prev_tag.outputs.tag }}"..HEAD -- src/ \
            | head -300 >> "$GITHUB_STEP_SUMMARY" || true

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [verify]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generar changelog con git-cliff
        uses: orhun/git-cliff-action@v3
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG_RELEASE.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Crear GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG_RELEASE.md
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
