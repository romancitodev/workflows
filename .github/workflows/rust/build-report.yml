name: Rust · Build & Report

on:
  workflow_call:
    inputs:
      execute:
        description: "Correr tests y coverage (!execute en el PR)"
        type: string
        required: true
      skip_tests:
        description: "Saltear tests aún con !execute (--skip-tests en el PR)"
        type: string
        required: true
      is_pr:
        description: "Si el evento es un pull_request"
        type: string
        required: true
    secrets:
      CODECOV_TOKEN:
        required: false

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  build-and-report:
    name: Build & Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      # ── Compilación ────────────────────────────────────────────────────────
      - name: Cargo check
        id: build
        run: cargo check --all-features
        continue-on-error: true

      # ── Tests + Coverage ───────────────────────────────────────────────────
      - name: Instalar cargo-llvm-cov
        if: |
          inputs.execute    == 'true' &&
          inputs.skip_tests != 'true'
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Tests + generar lcov
        id: tests
        if: |
          inputs.execute    == 'true' &&
          inputs.skip_tests != 'true'
        run: |
          cargo llvm-cov \
            --all-features \
            --workspace \
            --lcov \
            --output-path lcov.info
        continue-on-error: true

      - name: Extraer % de cobertura
        id: cov_pct
        if: steps.tests.outcome == 'success'
        run: |
          PCT=$(cargo llvm-cov report --summary-only 2>/dev/null \
            | awk '/^TOTAL/{ for(i=1;i<=NF;i++) if($i~/^[0-9]+\.[0-9]+%$/) last=$i; print last }' \
            | tr -d '%')
          echo "percent=${PCT:-N/A}" >> "$GITHUB_OUTPUT"

      - name: Subir a Codecov
        if: steps.tests.outcome == 'success'
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      # ── Comentario en el PR ────────────────────────────────────────────────
      - name: Publicar / actualizar comentario
        if: inputs.is_pr == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const buildOk   = '${{ steps.build.outcome }}'  === 'success';
            const execute   = '${{ inputs.execute }}'        === 'true';
            const skipTests = '${{ inputs.skip_tests }}'     === 'true';
            const testsOk   = '${{ steps.tests.outcome }}'  === 'success';
            const pct       = '${{ steps.cov_pct.outputs.percent }}';
            const sha7      = '${{ github.sha }}'.slice(0, 7);
            const repo      = '${{ github.repository }}';
            const prNum     = context.payload.pull_request.number;
            const prUrl     = context.payload.pull_request.html_url;
            const branch    = '${{ github.head_ref }}';

            const buildRow = buildOk
              ? '| 🔨 **Build**    | ✅ Compiled succesfully |'
              : '| 🔨 **Build**    | ❌ Error at Compile time |';

            let testsRow, covRow;
            if (!execute) {
              testsRow = '| 🧪 **Tests**    | Not executed |';
              covRow   = '| 📊 **Coverage** | — |';
            } else if (skipTests) {
              testsRow = '| 🧪 **Tests**    | Skipped (`--skip-tests`) |';
              covRow   = '| 📊 **Coverage** | — |';
            } else {
              testsRow = testsOk
                ? '| 🧪 **Tests**    | ✅ All tests executed successfully |'
                : '| 🧪 **Tests**    | ❌ Some test failed |';
              covRow = testsOk
                ? `| 📊 **Coverage** | \`${pct}%\` — [see in Codecov](https://app.codecov.io/gh/${repo}) |`
                : '| 📊 **Coverage** | — |';
            }

            const body = [
              '<!-- ci-bot -->',
              '## 🤖 CI Report',
              '',
              '| Check | Status |',
              '|---|---|',
              buildRow,
              testsRow,
              covRow,
              '',
              '---',
              `*Commit [\`${sha7}\`](${prUrl}/commits/${{ github.sha }}) · \`${branch}\`*`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: prNum,
            });
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('<!-- ci-bot -->')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: prNum, body,
              });
            }

      # ── Propagar fallo después de comentar ────────────────────────────────
      - name: Propagar fallo de compilación
        if: steps.build.outcome == 'failure'
        run: exit 1
