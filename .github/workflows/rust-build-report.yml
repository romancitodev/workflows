name: Rust · Build & Report

on:
  workflow_call:
    inputs:
      execute:
        description: "Ejecutar tests"
        type: string
        required: true
      skip_tests:
        description: "Saltear tests"
        type: string
        required: true
      is_pr:
        description: "Si es un pull request"
        type: string
        required: true
      cargo-test-flags:
        description: "Flags para cargo test"
        type: string
        required: false
        default: ""
      strict-mode:
        description: "Tests obligatorios"
        type: boolean
        required: false
        default: true
    secrets:
      CODECOV_TOKEN:
        required: false

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  build-and-report:
    name: Build & Report
    runs-on: ubuntu-latest
    steps:
      # Setup
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2

      # Build
      - name: Build check
        id: build
        run: cargo check --all-features
        continue-on-error: true

      # Test setup
      - name: Install test coverage tool
        if: inputs.execute == 'true' && inputs.skip_tests != 'true'
        uses: taiki-e/install-action@cargo-llvm-cov

      # Test execution
      - name: Run tests with coverage
        id: tests
        if: inputs.execute == 'true' && inputs.skip_tests != 'true'
        run: |
          set +e
          cargo llvm-cov \
            --all-features \
            --workspace \
            --lcov \
            --output-path lcov.info \
            ${{ inputs.cargo-test-flags }} -- --nocapture --test-threads=1 2>&1 | tee test-output.log
          TEST_EXIT=$?
          set -e
          
          if [ $TEST_EXIT -eq 0 ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
          fi
          exit $TEST_EXIT
        continue-on-error: true

      # Coverage extraction
      - name: Extract coverage percentage
        id: cov_pct
        if: steps.tests.outcome == 'success'
        run: |
          PCT=$(cargo llvm-cov report --summary-only 2>/dev/null \
            | awk '/^TOTAL/{ for(i=1;i<=NF;i++) if($i~/^[0-9]+\.[0-9]+%$/) last=$i; print last }' \
            | tr -d '%')
          echo "percent=${PCT:-N/A}" >> "$GITHUB_OUTPUT"

      # Upload to codecov
      - name: Upload coverage to Codecov
        if: steps.tests.outcome == 'success'
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      # Test failure details
      - name: Extract failed tests
        id: test_details
        if: steps.tests.outputs.status == 'failure'
        run: |
          if [ -f test-output.log ]; then
            FAILURES=$(grep -E "^test .* FAILED" test-output.log | head -20 || echo "")
            PANICS=$(grep -E "thread '.*' panicked" test-output.log | head -10 || echo "")
            
            if [ -n "$FAILURES" ] || [ -n "$PANICS" ]; then
              COMBINED=$(printf "%s\n%s" "$FAILURES" "$PANICS" | grep -v "^$")
              COMBINED=$(echo "$COMBINED" | jq -Rs '.')
              echo "failures=$COMBINED" >> "$GITHUB_OUTPUT"
            fi
          fi

      # PR comment
      - name: Post CI report to PR
        if: inputs.is_pr == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const buildOk   = '${{ steps.build.outcome }}'  === 'success';
            const execute   = '${{ inputs.execute }}'        === 'true';
            const skipTests = '${{ inputs.skip_tests }}'     === 'true';
            const testsOk   = '${{ steps.tests.outputs.status }}' === 'success';
            const pct       = '${{ steps.cov_pct.outputs.percent }}';
            const sha7      = '${{ github.sha }}'.slice(0, 7);
            const repo      = '${{ github.repository }}';
            const prNum     = context.payload.pull_request.number;
            const prUrl     = context.payload.pull_request.html_url;
            const branch    = '${{ github.head_ref }}';
            const failures  = '${{ steps.test_details.outputs.failures }}';

            const buildRow = buildOk
              ? '| 🔨 **Build**    | ✅ Compiled succesfully |'
              : '| 🔨 **Build**    | ❌ Error at Compile time |';

            let testsRow, covRow, failureDetail = '';
            if (!execute) {
              testsRow = '| 🧪 **Tests**    | Not executed |';
              covRow   = '| 📊 **Coverage** | — |';
            } else if (skipTests) {
              testsRow = '| 🧪 **Tests**    | Skipped (`--skip-tests`) |';
              covRow   = '| 📊 **Coverage** | — |';
            } else {
              testsRow = testsOk
                ? '| 🧪 **Tests**    | ✅ All tests executed successfully |'
                : '| 🧪 **Tests**    | ❌ Some test failed |';
              covRow = testsOk
                ? `| 📊 **Coverage** | \`${pct}%\` — [see in Codecov](https://app.codecov.io/gh/${repo}) |`
                : '| 📊 **Coverage** | — |';

              if (!testsOk && failures) {
                try {
                  const failList = JSON.parse(failures).split('\n').filter(l => l.trim());
                  if (failList.length > 0) {
                    failureDetail = '\n\n### ❌ Failed Tests\n```\n' + failList.join('\n') + '\n```';
                  }
                } catch (e) {
                  failureDetail = '\n\n### ❌ Failed Tests\n```\n' + failures + '\n```';
                }
              }
            }

            const body = [
              '<!-- ci-bot -->',
              '## 🤖 CI Report',
              '',
              '| Check | Status |',
              '|---|---|',
              buildRow,
              testsRow,
              covRow,
              '',
              '---',
              `*Commit [\`${sha7}\`](${prUrl}/commits/${{ github.sha }}) · \`${branch}\`*`,
              failureDetail,
            ].join('\n').trim();

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: prNum,
            });
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('<!-- ci-bot -->')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: prNum, body,
              });
            }

      # Status checks
      - name: Fail if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1

      - name: Fail if tests failed in strict mode
        if: inputs.strict-mode == true && steps.tests.outputs.status == 'failure'
        run: |
          echo "::error:: ❌ Tests failed in strict mode - PR cannot be merged"
          exit 1

      - name: Warn if tests failed in non-strict mode
        if: inputs.strict-mode == false && steps.tests.outputs.status == 'failure'
        run: |
          echo "::warning:: ⚠️ Tests failed but merge is allowed (non-strict mode)"
          exit 0
