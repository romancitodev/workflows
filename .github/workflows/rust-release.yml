name: Rust · Release

on:
  workflow_call:
    secrets:
      CARGO_REGISTRY_TOKEN:
        required: true   # token para publicar en crates.io
      GH_TOKEN:
        required: false  # si no se pasa, usa GITHUB_TOKEN automáticamente

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  verify:
    name: Verify build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features
      - run: cargo build --release --all-features

  release:
    name: Release with cargo-release
    runs-on: ubuntu-latest
    needs: [verify]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Instalar cargo-release
        uses: taiki-e/install-action@cargo-release

      - name: Ejecutar cargo release
        run: cargo release --execute --no-confirm
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
