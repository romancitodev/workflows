name: Rust · CI

on:
  workflow_call:
    inputs:
      clippy-extra-flags:
        description: "Flags adicionales para clippy"
        type: string
        required: false
        default: ""
      cargo-test-flags:
        description: "Flags adicionales para cargo test (ej: --lib, --doc)"
        type: string
        required: false
        default: ""
      strict-mode:
        description: "Modo estricto: los tests deben pasar siempre"
        type: boolean
        required: false
        default: false
    secrets:
      CODECOV_TOKEN:
        required: false

jobs:
  flags:
    name: Parse PR flags
    runs-on: ubuntu-latest
    outputs:
      execute:    ${{ steps.parse.outputs.execute }}
      skip_tests: ${{ steps.parse.outputs.skip_tests }}
      is_pr:      ${{ steps.parse.outputs.is_pr }}
    steps:
      - id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const isPR  = context.eventName === 'pull_request';
            const prDescription = context.payload.pull_request?.body ?? '';
            const prComment = context.payload.comment?.body ?? '';
            const firstLine = prDescription.split(/\r?\n/)[0].trim();
            
            // Buscar !execute en descripción o comentario
            const hasExecute = firstLine.includes('!execute') || prComment.includes('!execute');
            const hasSkipTests = firstLine.includes('--skip-tests') || prComment.includes('--skip-tests');

            core.setOutput('is_pr',      String(isPR));
            core.setOutput('execute',    String(isPR && hasExecute));
            core.setOutput('skip_tests', String(isPR && hasSkipTests));

  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    needs: flags
    uses: ./.github/workflows/rust-lint.yml
    with:
      clippy-extra-flags: ${{ inputs.clippy-extra-flags }}

  # ── 2. Build + PR comment + Coverage ──────────────────────────────────────
  build-and-report:
    name: Build & Report
    needs: flags
    uses: ./.github/workflows/rust-build-report.yml
    with:
      execute:    ${{ needs.flags.outputs.execute }}
      skip_tests: ${{ needs.flags.outputs.skip_tests }}
      is_pr:      ${{ needs.flags.outputs.is_pr }}
      cargo-test-flags: ${{ inputs.cargo-test-flags }}
      strict-mode: ${{ inputs.strict-mode }}
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── 3. MSRV ────────────────────────────────────────────────────────────────
  msrv:
    name: MSRV
    needs: flags
    uses: ./.github/workflows/rust-msrv.yml
